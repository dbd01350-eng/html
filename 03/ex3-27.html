<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for 반복2</title>
</head>
<body>
    <script>
        let sum = 0 ;
        for (let a = 1; a < 101; a++) {
            document.write(`${a}<br>`);
            sum = sum += a
            
        }
        document.write(`<hr><hr><hr>${sum}`);
    </script>
</body>
</html>

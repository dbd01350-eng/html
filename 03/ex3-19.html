<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=, initial-scale=1.0" />
    <title>if문</title>
  </head>
  <body>
    <script>
      let your_sex = prompt("성별을 입력하세요", "남자, 여자");
      if (your_sex == "남자") {
        document.write("네 이름은 철수야 맞지?");
      }

      if (your_sex == "여자") {
        document.write("네 이름은 영희야 맞지?");
      }
      document.write("부모님 속상하시겠다.");
    </script>
  </body>
</html>

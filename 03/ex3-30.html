<html lang="ko">
  <head>

    <title>Document</title>

  <body>
    <script>
      //함수의 선은
      function 믹서기() {
        console.log('메론' + '바나나');
        //기능,실행문
      }
      //함수의 호출
      믹서기()
    </script>
    <script>
        function 믹서기2(과일1, 과일2) {
            console.log(`😀${과일1+과일2}`);
            
        }
        믹서기2('사과', '바나나');
        믹서기2('망고', '바나나');
        믹서기2('치킨', '바나나');
        믹서기2('바나나', '바나나');
        
    </script>
  </body>

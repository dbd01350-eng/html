<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>class 선택자</title>
    <style>
      .happy {
        color: rgb(255, 255, 255);
        background-color: magenta;
      }
      .tea {
        color: green;
      }
      .point {
        background-color: pink;
      }
      .t_center {
        text-align: center;
      }
      .food{color: mediumslateblue;}
    </style>
  </head>
  <body>
    <p class="happy t_center">우리를 기쁘게 하는 것들</p>
    <p class="tea t_center">건강에 좋은 <span class="point">차</span></p>
    <p class="food t_center">머리가 좋아지는 <span class="point">음식</span></p>
    <p></p>
  </body>
</html>

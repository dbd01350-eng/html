<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>전체선택자</title>
    /* 웹브라우저가 갖고있는 기본스타일 속성을 초기화 할때 주로 사용 */
    <style>
      * {
        margin: 0px;
        padding: 0px;
        color: #0000ff;
      }
    </style>
  </head>
  <body>
    <h2>입고신고쓰고끼는 것들..</h2>
    <ul>
      <li>옷</li>
      <li>신발</li>
      <li>안경</li>
      <li>장갑</li>
    </ul>

    <p>발이 편한 신발과 눈이 편한 안경은 필수이다.</p>
    <h2>제미나이 사용법</h2>
    <ul>
      <li>프롬프트 작성시 응답도 토큰비용으로 소모됨</li>
      <li>응답은 문서형식 요청하고 터미널 창으로 출력하지 말라고 요청</li>
    </ul>
    <p>자신의 학습수준을 설명하면 더욱 좋은 응답을 받을 수 있음</p>
  </body>
</html>

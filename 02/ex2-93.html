<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>calc 레이아웃</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      /* 최상위 요소 선택자 */
      :root{
        /* --num10 = 10px이다
          자주 사용하는 단위를 변수로 지정해놓고 사용하면 편하다 */
        --num10: 10px;
        --primary: palevioletred;
      }
      .layout{
        display: flex;
      }
      aside{
        background-color: palegreen;
        width: calc(var(--num10)*25);
      }
      main{
        background-color: var(--primary);
        width: calc(100% - 250px);
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside>사이드바</aside>
      <main>본문 영역</main>
    </div>
  </body>
</html>

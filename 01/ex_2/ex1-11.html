<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>목록 요소</title>
  </head>
  <body>
    <h3>순서 있는 목록요소</h3>
    <!-- ol>li*3 하면 한번에 나옴 -->
    <ol>
      <li>html</li>
      <li>css</li>
      <li>js</li>
    </ol>
    <h3>순서 없는 목록요소</h3>
    <!-- u1>li*3 하면 한번에 나옴 -->
    <u1>
      <li>html</li>
      <li>css</li>
      <li>js</li>
    </u1>
    <h3>정의 목록 요소</h3>
    <!-- dl>dt+dt*3 -->
    <dl>
      <dt>정의1</dt>
      <dd>명사1</dd>
      <dd>명사2</dd>
      <dd>명사3</dd>
    </dl>
    <dl>
      <dt>정의2</dt>
      <dd>명사1</dd>
      <dd>명사2</dd>
      <dd>명사3</dd>
    </dl>
  </body>
</html>

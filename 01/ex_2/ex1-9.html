<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>이미지태그</title>
  </head>
  <body>
    <!-- alt 속성의 3가지 용법
     1. 접근성 향상:스크린리더기가 alt 속성을 음성으로 읽어줍니다
     2. 대체텍스트:이미지가 안뜰 경우 alt 속성이 대신 화면에 보입니다
     3. seo 향상(search engine optimization):검색엔진에 이미지의 정보를 알려줍니다  -->
    <!-- 태그가 웹페이지에서 표시될 때 두개로 분류된다.
            1. 블록레벨 : 아래로 표시 = 줄바꿈 됨
            2. 인라인레벨 : 옆으로 표시 -->
    <img
      src="img/kuromi.gif"
      alt="쿠로미가 귀엽게 하트를 날리면서 부탁을 하는 사진"
      width="500"
    /><br />
    <img
      src="img/kuromii.gif"
      alt="쿠로미가 귀엽게 하트를 날리면서 부탁을 하는 사진"
      width="500"
    />
  </body>
</html>

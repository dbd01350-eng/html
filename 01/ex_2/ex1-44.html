<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>셀 병합 퀴즈</title>
    <style>
      table,
      tr,
      td,
      th {
        border: 1px solid #000;
      }
      table {
        width: 300px;
        height: 150px;
        margin: 50px;
      }
      th {
        text-align: center;
        padding: auto;
      }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <th colspan="2">컴퓨터 그래픽스 기능사</th>
      </tr>
      <tr>
        <th rowspan="3">프로그램</th>
        <th>일러스트</th>
      </tr>
      <tr>
        <th>포토샵</th>
      </tr>
      <tr>
        <th>인디자인</th>
      </tr>
    </table>
  </body>
</html>

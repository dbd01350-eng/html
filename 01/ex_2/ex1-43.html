<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>셀병합하기</title>
    <style>
      table,
      tr,
      td,
      th {
        border: 1px solid #000;
      }
    </style>
  </head>
  <body>
    <table>
      <thead>
        <tr>
          <td colspan="3">2학년 반 목록</td>
        </tr>
      </thead>
      <tr>
        <td>2-1</td>
        <td>2-2</td>
        <td>2-3</td>
      </tr>
    </table>
    <table>
        <tr>
          <td rowspan="3">1-1</td>
          <td>1-2</td>
          <td>1-3</td>
        </tr>
     
        <tr>
          <td>2-2</td>
          <td>2-3</td>
        </tr>
        <tr>
          <td>3-2</td>
          <td>3-3</td>
        </tr>
    </table>
  </body>
</html>

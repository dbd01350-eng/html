<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>혼자div해본것</title>
    <style>
      .point {
        color: #0047ff;
        font-size: 20px;
        font-weight: bold;
      }

      .box {
        background-color: pink;
        padding: 20px;
        margin: 10px;
        border-radius: 15px;
        width: 200px;
        height: 50px;
      }

      .info {
        background: #f4f8ff;
        padding: 20px;
        margin: 20px;
        border-radius: 15px;
      }
    </style>
  </head>

  <body>
    <section>
      <h2>예제 div</h2>
      <div
        style="
          width: 200px;
          height: 100px;
          background-color: yellow;
          text-align: center;
        "
      >
        가운데 글자
      </div>
    </section>

    <section class="info">
      <h2>🍀 자기소개</h2>

      <p>저는 HTML 공부중이에요!</p>
    </section>

    <div class="box">
      첫 번째 박스
      <p>나는 <span class="point">특별한 글자</span>야!</p>
    </div>

    <div class="box">두 번째 박스</div>

    <div class="box">세 번째 박스</div>
  </body>
</html>

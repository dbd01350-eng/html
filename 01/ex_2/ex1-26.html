<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>260520 과제</title>
    <link rel="stylesheet" href="style1-26.css" />
  </head>
  <body>
    <div>
      <img src="./img/07.png" alt="한방샴푸로고이미지" />
      <table>
        <caption>
          레시피 재료
        </caption>
        <thead>
          <tr>
            <th>재료</th>
            <th>첨가량</th>
            <th>48시간</th>
            <th>대체재료</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <th rowspan="5">수상층</th>
            <th>로즈마리 추출물</th>
            <th>30g</th>
            <th rowspan="3">증류수</th>
          </tr>
          <tr>
            <th>네틀추출물</th>
            <th>30g</th>
          </tr>
          <tr>
            <th>증류수</th>
            <th>90g</th>
          </tr>
          <tr>
            <th>폴리쿼터</th>
            <th>1.5g</th>
            <th>쟁탄검</th>
          </tr>
          <tr>
            <th>글리세린</th>
            <th>10g</th>
            <th>히아루론산 10g</th>
          </tr>
          <tr>
            <th rowspan="3">계면활성제</th>
            <th>LES/ CDE</th>
            <th>180g / 10g</th>
            <th>CDE + LES</th>
          </tr>
          <tr>
            <th>코코베타인</th>
            <th>5g</th>
            <th>X</th>
          </tr>
          <tr>
            <th>애플 계면 활정제</th>
            <th>10g</th>
            <th>올리브 계면 활성제</th>
          </tr>
        </tbody>
        <tfoot>
          <tr>
            <th colspan="4">좋은 향을 위해서면 엘라스틴향 사용 추천</th>
          </tr>
        </tfoot>
      </table>
    </div>
    <br /><br /><br />
    <div>
      <form action="#" method="get">
        <fieldset>
          <legend>두번째과제</legend>
          <p>
            <input type="text" required placeholder="아이디" />
            <select name="-- select --" id="email">
              <option value="-- select --">-- select --</option>
              <option value="nate.com">nate.com</option>
              <option value="daum.net">daum.net</option>
              <option value="naver.com">naver.com</option>
              <option value="paran.com">paran.com</option>
              <option value="hotmail.com">hotmail.com</option>
            </select>
          </p>
          <p>
            <input type="password" /><button type="submit" style="display: contents">&nbsp;<img src="./img/08.png" alt="로그인버튼" /></button>
          </p>
        </fieldset>
      </form>
    </div>
  </body>
</html>
